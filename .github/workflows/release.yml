name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-sidecar:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x64
            binary: delta-vscode
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            platform: linux-arm64
            binary: delta-vscode
          - os: macos-latest
            target: x86_64-apple-darwin
            platform: darwin-x64
            binary: delta-vscode
          - os: macos-latest
            target: aarch64-apple-darwin
            platform: darwin-arm64
            binary: delta-vscode
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: win32-x64
            binary: delta-vscode.exe
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            platform: win32-arm64
            binary: delta-vscode.exe

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.platform == 'linux-arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.platform }}

      - name: Build sidecar
        run: cargo build --release --target ${{ matrix.target }} -p delta-vscode

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: sidecar-${{ matrix.platform }}
          path: target/${{ matrix.target }}/release/${{ matrix.binary }}

  package:
    needs: build-sidecar
    runs-on: ubuntu-latest
    name: Package (universal)

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install extension dependencies
        working-directory: extension
        run: npm ci

      - name: Compile TypeScript
        working-directory: extension
        run: npm run compile

      - name: Download linux-x64 binary
        uses: actions/download-artifact@v4
        with:
          name: sidecar-linux-x64
          path: extension/bin/linux-x64

      - name: Download linux-arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: sidecar-linux-arm64
          path: extension/bin/linux-arm64

      - name: Download darwin-x64 binary
        uses: actions/download-artifact@v4
        with:
          name: sidecar-darwin-x64
          path: extension/bin/darwin-x64

      - name: Download darwin-arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: sidecar-darwin-arm64
          path: extension/bin/darwin-arm64

      - name: Download win32-x64 binary
        uses: actions/download-artifact@v4
        with:
          name: sidecar-win32-x64
          path: extension/bin/win32-x64

      - name: Download win32-arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: sidecar-win32-arm64
          path: extension/bin/win32-arm64

      - name: Make binaries executable
        run: |
          chmod +x extension/bin/linux-x64/delta-vscode 2>/dev/null || true
          chmod +x extension/bin/linux-arm64/delta-vscode 2>/dev/null || true
          chmod +x extension/bin/darwin-x64/delta-vscode 2>/dev/null || true
          chmod +x extension/bin/darwin-arm64/delta-vscode 2>/dev/null || true

      - name: Package universal VSIX
        working-directory: extension
        run: npx vsce package -o ../delta-viewer.vsix

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: vsix-universal
          path: delta-viewer.vsix

  release:
    needs: package
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    name: Create Release

    steps:
      - name: Download VSIX
        uses: actions/download-artifact@v4
        with:
          name: vsix-universal

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: "delta-viewer.vsix"

  publish:
    needs: package
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    name: Publish to Marketplace

    steps:
      - name: Download VSIX
        uses: actions/download-artifact@v4
        with:
          name: vsix-universal

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Publish to VS Code Marketplace
        run: vsce publish --packagePath delta-viewer.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
